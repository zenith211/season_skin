            <li><span class="tag t-march">행군</span> <span>${d[c].m}</span></li>
          </ul>
          <div class="point-box">
            <div class="point-row"><span class="hl-vk">[키워드]</span> ${d[c].vk}</div>
            <div class="point-row"><span class="hl-vfx">[VFX 연출]</span> ${d[c].vfx}</div>
          </div>
        </td>
      `).join('')}
    `;
    tbody.appendChild(tr);
  });
</script>

</body>
</html>
